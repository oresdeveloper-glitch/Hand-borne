<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="HBA - AI-powered hand bone abnormality detection platform for medical professionals." />
    <meta name="theme-color" content="#2563eb" />
    <title>HBA - Hand Bone Abnormality Detection</title>
    
    <!-- Inline theme script to prevent FOUC (Flash of Unstyled Content) -->
    <script>
      (function() {
        try {
          const storage = localStorage.getItem('hba-storage');
          const stored = storage ? JSON.parse(storage) : null;
          const savedMode = stored?.state?.isDarkMode;
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          const isDark = savedMode !== undefined ? savedMode : prefersDark;
          
          if (isDark) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.colorScheme = 'dark';
          } else {
            document.documentElement.classList.remove('dark');
            document.documentElement.style.colorScheme = 'light';
          }
        } catch (e) {
          // Fallback to system preference
          if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
          }
        }
      })();
    </script>
    
    <!-- Preload critical font for professional typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    
    <style>
      /* Critical CSS to prevent layout shift */
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        margin: 0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      html.dark body {
        background-color: rgb(15, 23, 42);
        color: rgb(241, 245, 249);
      }
      html:not(.dark) body {
        background-color: rgb(248, 250, 252);
        color: rgb(15, 23, 42);
      }
      #root {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
