name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Hugging Face Hub
        run: pip install -U huggingface_hub

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ vars.HF_SPACE_REPO }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN secret is not set";
            exit 1;
          fi
          if [ -z "$HF_SPACE_REPO" ]; then
            echo "HF_SPACE_REPO variable is not set";
            exit 1;
          fi
          python - <<'PY'
          from huggingface_hub import HfApi
          import os
          api = HfApi(token=os.environ['HF_TOKEN'])
          repo_id = os.environ['HF_SPACE_REPO']
            api.create_repo(repo_id=repo_id, repo_type='space', space_sdk='gradio', exist_ok=True)
            # Create or update requirements.txt for the Space build
            try:
              with open('requirements-space.txt','r') as f:
                reqs = f.read()
              with open('requirements.txt','w') as f:
                f.write(reqs)
            except Exception:
              pass
          api.upload_folder(
              folder_path='.',
              repo_id=repo_id,
              repo_type='space',
              ignore_patterns=['.git', '.github', '__pycache__', '.venv', 'node_modules', 'dist']
          )
          PY
