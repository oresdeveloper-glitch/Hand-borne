name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Hugging Face Hub
        run: pip install -U huggingface_hub

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ vars.HF_SPACE_REPO }}
          HF_MODEL_REPO: ${{ vars.HF_MODEL_REPO }}
          HF_MODEL_FILENAME: ${{ vars.HF_MODEL_FILENAME }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN secret is not set";
            exit 1;
          fi
          if [ -z "$HF_SPACE_REPO" ]; then
            echo "HF_SPACE_REPO variable is not set";
            exit 1;
          fi
          # If HF_MODEL_REPO is set, upload the model file to a model repo on the Hub
          if [ -n "$HF_MODEL_REPO" ]; then
            echo "HF_MODEL_REPO set — uploading model to $HF_MODEL_REPO"
            python - <<'PY'
from huggingface_hub import HfApi
import os
api = HfApi(token=os.environ['HF_TOKEN'])
repo_id = os.environ['HF_MODEL_REPO']
filename = os.environ.get('HF_MODEL_FILENAME', 'best_model.keras')
local_path = os.path.join('saved_model', filename)
try:
    api.create_repo(repo_id=repo_id, repo_type='model', exist_ok=True)
    api.upload_file(
        path_or_fileobj=local_path,
        path_in_repo=filename,
        repo_id=repo_id,
        repo_type='model',
        token=os.environ['HF_TOKEN']
    )
    print('Uploaded model to', repo_id)
except Exception as e:
    print('Failed to upload model to HF Hub:', e)
    # do not exit workflow — Space deployment can still use a local model if present
PY
          fi
          python - <<'PY'
          from huggingface_hub import HfApi
          import os
          api = HfApi(token=os.environ['HF_TOKEN'])
          repo_id = os.environ['HF_SPACE_REPO']
            api.create_repo(repo_id=repo_id, repo_type='space', space_sdk='gradio', exist_ok=True)
            # Create or update requirements.txt for the Space build
            try:
              with open('requirements-space.txt','r') as f:
                reqs = f.read()
              with open('requirements.txt','w') as f:
                f.write(reqs)
            except Exception:
              pass
          api.upload_folder(
              folder_path='.',
              repo_id=repo_id,
              repo_type='space',
              ignore_patterns=['.git', '.github', '__pycache__', '.venv', 'node_modules', 'dist']
          )
          PY
